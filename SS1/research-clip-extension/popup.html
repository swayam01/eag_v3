<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Clip</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Research Clip</h1>
        <p class="subtitle">Save useful content from any webpage</p>
      </div>
      <label class="theme-toggle" title="Toggle dark mode">
        <input type="checkbox" id="themeToggle" />
        <span>Dark</span>
      </label>
    </header>

    <section class="card save-card">
      <div class="section-title-row">
        <h2>Save Current Selection</h2>
        <button id="refreshSelectionBtn" class="ghost small-btn">Refresh</button>
      </div>

      <label class="label">Selected text</label>
      <textarea id="selectedText" rows="4" placeholder="Select text on the page and open the extension..."></textarea>

      <label class="label">Note</label>
      <textarea id="manualNote" rows="3" placeholder="Add your own note"></textarea>

      <label class="label">Tags</label>
      <input id="tagsInput" type="text" placeholder="AI, Research, Work" />

      <div class="meta-box">
        <div><span class="meta-label">Title:</span> <span id="pageTitle">-</span></div>
        <div><span class="meta-label">URL:</span> <span id="pageUrl">-</span></div>
      </div>

      <div class="button-row">
        <button id="saveBtn" class="primary">Save Clip</button>
        <button id="clearFormBtn" class="ghost">Clear</button>
      </div>
    </section>

    <section class="card list-card">
      <div class="section-title-row">
        <h2>Saved Clips</h2>
        <span id="itemCount" class="count-pill">0</span>
      </div>

      <input id="searchInput" type="text" placeholder="Search title, text, notes, tags, or URL" />

      <div id="listContainer" class="list-container"></div>
      <div id="emptyState" class="empty-state hidden">No saved clips yet.</div>
    </section>
  </div>

  <template id="itemTemplate">
    <article class="clip-item">
      <div class="clip-head">
        <h3 class="clip-title"></h3>
        <div class="clip-actions">
          <button class="ghost small-btn copy-btn">Copy</button>
          <button class="ghost small-btn edit-btn">Edit</button>
          <button class="danger small-btn delete-btn">Delete</button>
        </div>
      </div>
      <a class="clip-url" target="_blank" rel="noreferrer"></a>
      <p class="clip-selection"></p>
      <p class="clip-note"></p>
      <div class="clip-tags"></div>
      <div class="clip-footer"></div>
    </article>
  </template>

  <script src="popup.js"></script>
</body>
</html>
