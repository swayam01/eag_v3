<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Audio Insight — Recorder</title>
  <style>
    :root {
      --bg: #f6f7fb; --surface: #fff; --text: #1f2330; --muted: #6b7280;
      --border: #e5e7eb; --accent: #7c3aed; --accent-hover: #6d28d9;
      --danger: #dc2626; --success: #047857; --warn: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); font-size: 13px;
      display: flex; justify-content: center; padding: 20px;
    }
    .recorder { width: 360px; }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .subtitle { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
    }
    .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    button {
      cursor: pointer; border-radius: 8px; padding: 10px 20px;
      font-size: 13px; font-weight: 600; border: none; font-family: inherit;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-record { background: var(--accent); color: white; }
    .btn-record:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-record.recording { background: var(--danger); }
    .btn-record.recording:hover { background: #b91c1c; }
    .btn-secondary {
      background: transparent; color: var(--text);
      border: 1px solid var(--border); padding: 8px 14px;
    }
    .btn-secondary:hover:not(:disabled) { background: var(--bg); }
    .timer {
      font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums;
      color: var(--danger); min-width: 50px;
    }
    .dot {
      width: 12px; height: 12px; border-radius: 50%; background: var(--danger);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .hidden { display: none !important; }
    label { display: block; font-size: 11px; color: var(--muted); margin: 12px 0 4px; text-transform: uppercase; }
    input[type="text"] {
      width: 100%; padding: 8px 10px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg); color: var(--text);
      font-size: 13px; font-family: inherit;
    }
    input:focus { outline: none; border-color: var(--accent); }
    audio { width: 100%; height: 36px; margin: 8px 0; }
    .actions { display: flex; gap: 8px; margin-top: 12px; }
    .status {
      margin-top: 12px; padding: 8px 10px; border-radius: 8px;
      font-size: 12px; background: var(--bg); border: 1px solid var(--border);
    }
    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }
    .status.working { color: var(--warn); }
  </style>
</head>
<body>
  <div class="recorder">
    <h1>🎙️ Mic Recorder</h1>
    <p class="subtitle">Record audio, then transcribe & save ✨</p>

    <div class="card">
      <div class="controls">
        <button id="recordBtn" class="btn-record">Start Recording</button>
        <span id="timer" class="timer hidden">0:00</span>
        <span id="dot" class="dot hidden"></span>
      </div>

      <div id="previewSection" class="hidden">
        <audio id="preview" controls></audio>
        <label>Label</label>
        <input id="labelInput" type="text" placeholder="e.g. Meeting notes, Lecture, Interview" />

        <div class="actions">
          <button id="transcribeBtn" class="btn-record">🚀 Transcribe & Save</button>
          <button id="discardBtn" class="btn-secondary">🗑️ Discard</button>
        </div>
      </div>

      <div id="status" class="status hidden"></div>
    </div>
  </div>

  <script src="gemini.js"></script>
  <script src="recorder.js"></script>
</body>
</html>
